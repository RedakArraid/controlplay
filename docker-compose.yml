services:
  app:
    build:
      context: /Users/kader/Desktop/control/controlplay
      dockerfile: /Users/kader/Desktop/control/controlplay/app/Dockerfile
    container_name: controlplay-app
    env_file:
      - /Users/kader/Desktop/control/controlplay/.env
    volumes:
      - /Users/kader/Desktop/control/controlplay/app:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: /Users/kader/Desktop/control/controlplay
      dockerfile: /Users/kader/Desktop/control/controlplay/worker/Dockerfile
    container_name: controlplay-worker
    env_file:
      - /Users/kader/Desktop/control/controlplay/.env
    volumes:
      - /Users/kader/Desktop/control/controlplay/app:/app
      - /Users/kader/Desktop/control/controlplay/worker:/worker
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A worker.celery_app worker --loglevel=INFO

  db:
    image: postgres:16-alpine
    container_name: controlplay-db
    environment:
      POSTGRES_DB: controlplay
      POSTGRES_USER: controlplay
      POSTGRES_PASSWORD: controlplay
    volumes:
      - controlplay-db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U controlplay -d controlplay"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: controlplay-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  controlplay-db-data:
